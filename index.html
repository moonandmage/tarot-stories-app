<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot Stories Method — Moon & Mage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#ffffff;color:#111111;font-family:Georgia,'Times New Roman',serif;min-height:100vh;}
#app{max-width:700px;margin:0 auto;padding:1.5rem 1rem;}
.app-header{text-align:center;padding:1.5rem 0 1rem;border-bottom:1px solid #b89967;margin-bottom:2rem;}
.app-title{font-size:24px;font-weight:500;letter-spacing:0.04em;color:#111111;}
.app-sub{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#b89967;margin-top:6px;font-family:Arial,sans-serif;}
.progress-bar{display:flex;align-items:center;gap:8px;margin-bottom:2rem;justify-content:center;}
.prog-step{width:22px;height:2px;background:#e0d9d0;}
.prog-step.active{background:#b89967;}
.level-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:1.5rem;}
.level-card{border:0.5px solid #e0d9d0;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;background:#ffffff;transition:border-color 0.15s;display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:center;}
.level-card:hover{border-color:#b89967;}
.level-num{font-size:20px;font-weight:500;color:#b89967;text-align:center;}
.level-name{font-size:15px;font-weight:500;color:#111111;margin-bottom:3px;}
.level-desc{font-size:13px;color:#888888;font-family:Arial,sans-serif;line-height:1.5;}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.theme-card{border:0.5px solid #e0d9d0;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;background:#ffffff;transition:border-color 0.15s;text-align:center;}
.theme-card:hover{border-color:#b89967;}
.theme-name{font-size:15px;font-weight:500;color:#111111;}
.theme-count{font-size:12px;color:#aaaaaa;font-family:Arial,sans-serif;margin-top:4px;}
.spread-list{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:1.5rem;}
.spread-card{border:0.5px solid #e0d9d0;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;background:#ffffff;transition:border-color 0.15s;}
.spread-card:hover{border-color:#b89967;}
.spread-badge{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#b89967;margin-bottom:4px;font-family:Arial,sans-serif;}
.spread-name{font-size:15px;font-weight:500;margin-bottom:4px;color:#111111;}
.spread-desc{font-size:13px;color:#888888;line-height:1.5;font-family:Arial,sans-serif;}
.spread-count{display:inline-block;margin-top:6px;font-size:12px;color:#aaaaaa;font-family:Arial,sans-serif;}
.slot-divider{border:none;border-top:0.5px solid #e0d9d0;margin:16px 0;}
.card-input{width:100%;font-size:14px;padding:9px 12px;border:0.5px solid #e0d9d0;border-radius:8px;background:#ffffff;color:#111111;font-family:Arial,sans-serif;margin-bottom:8px;display:block;}
.card-input:focus{outline:none;border-color:#b89967;}
.freeform-ta{width:100%;font-size:14px;padding:9px 12px;border:0.5px solid #e0d9d0;border-radius:8px;background:#ffffff;color:#111111;font-family:Arial,sans-serif;resize:none;line-height:1.6;display:block;}
.freeform-ta:focus{outline:none;border-color:#b89967;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;flex-wrap:wrap;align-items:center;}
.btn-start-over{font-size:12px;color:#aaaaaa;font-family:Arial,sans-serif;cursor:pointer;background:none;border:none;margin-right:auto;text-decoration:underline;}
.btn-start-over:hover{color:#b89967;}
.btn-primary{font-size:13px;padding:10px 22px;background:#b89967;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:Arial,sans-serif;letter-spacing:0.06em;}
.btn-primary:hover{background:#a0834f;}
.btn-ghost{font-size:13px;padding:10px 18px;background:transparent;color:#888888;border:0.5px solid #e0d9d0;border-radius:8px;cursor:pointer;font-family:Arial,sans-serif;}
.btn-ghost:hover{border-color:#b89967;color:#111111;}
.btn-small{font-size:12px;padding:7px 14px;background:transparent;color:#b89967;border:0.5px solid #b89967;border-radius:8px;cursor:pointer;font-family:Arial,sans-serif;}
.btn-small:hover{background:#b89967;color:#fff;}
.loading{text-align:center;padding:2rem 0;color:#888888;font-family:Arial,sans-serif;font-size:14px;}
.story-wrap{border:0.5px solid #e0d9d0;border-radius:12px;overflow:hidden;margin-bottom:1.5rem;}
.story-section{padding:1.25rem 1.5rem;border-bottom:0.5px solid #e0d9d0;}
.story-section:last-child{border-bottom:none;}
.story-section-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#b89967;margin-bottom:8px;font-family:Arial,sans-serif;}
.story-section p{font-size:15px;line-height:1.9;color:#111111;font-family:Arial,sans-serif;}
.blank-input{width:130px;font-size:13px;padding:3px 6px;border:none;border-bottom:1.5px solid #b89967;background:transparent;color:#111111;font-family:Arial,sans-serif;outline:none;}
.step-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#b89967;margin-bottom:8px;font-family:Arial,sans-serif;}
h2{font-size:20px;font-weight:500;margin-bottom:6px;color:#111111;}
.sub{font-size:14px;color:#888888;margin-bottom:1rem;font-family:Arial,sans-serif;line-height:1.6;}
.note-box{background:#f9f7f4;border:0.5px solid #e0d9d0;border-radius:8px;padding:1rem 1.25rem;margin-bottom:1.25rem;font-family:Arial,sans-serif;font-size:13px;color:#555555;line-height:1.7;}
.note-box strong{color:#111111;font-weight:500;}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;font-family:Arial,sans-serif;font-size:13px;color:#888888;}
.toggle{position:relative;width:36px;height:20px;cursor:pointer;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#e0d9d0;border-radius:20px;transition:0.2s;}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:0.2s;}
input:checked+.toggle-slider{background:#b89967;}
input:checked+.toggle-slider:before{transform:translateX(16px);}
.err{color:#c0392b;font-family:Arial,sans-serif;font-size:13px;padding:1rem 0;}
.feedback-wrap{background:#f9f7f4;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;}
.pos-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.pos-num{font-size:13px;color:#b89967;font-family:Arial,sans-serif;width:20px;flex-shrink:0;}
.prompt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem;}
.prompt-pill{font-size:12px;font-family:Arial,sans-serif;padding:6px 10px;border:0.5px solid #e0d9d0;border-radius:20px;cursor:pointer;color:#555555;background:#fff;text-align:left;line-height:1.4;}
.prompt-pill:hover{border-color:#b89967;color:#b89967;}
.l5-prompt{font-size:22px;font-weight:500;color:#111111;padding:1rem 0 0.25rem;border-bottom:0.5px solid #e0d9d0;margin-bottom:1rem;}
.l5-hint{font-size:12px;color:#b89967;font-family:Arial,sans-serif;margin-bottom:0.75rem;}
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="app-title">Tarot Stories Method</div>
    <div class="app-sub">Moon &amp; Mage &middot; The Tarot Circle</div>
  </div>
  <div class="progress-bar" id="prog"></div>
  <div id="screen"></div>
</div>
<script>
const SPREADS=[
  {id:"ppf",name:"Past, Present, Future",theme:"General",desc:"Three cards. One clear storyline.",positions:["Past","Present","Future"]},
  {id:"sao",name:"Situation, Action, Outcome",theme:"General",desc:"What's happening, what to do, where it leads.",positions:["Situation","Action","Outcome"]},
  {id:"mbs",name:"Mind, Body, Spirit",theme:"Personal Growth",desc:"A fuller picture of where you are right now.",positions:["Mind","Body","Spirit","Integration","Message"]},
  {id:"bgp",name:"Block, Gift, Path",theme:"Personal Growth",desc:"What's in the way, what you have, how to move.",positions:["The Block","Hidden Gift","The Path","Next Step"]},
  {id:"sc",name:"The Story Cross",theme:"General",desc:"Six cards. Full narrative from root to resolution.",positions:["Root Cause","Crossing Energy","Foundation","Recent Past","Possible Future","Resolution"]},
  {id:"sl",name:"Shadow & Light",theme:"Shadow Work",desc:"What you're avoiding and what's trying to emerge.",positions:["The Shadow","The Wound","The Gift Inside It","What Light Looks Like","The Integration","Your Next Move"]},
  {id:"lv1",name:"Where Is This Going?",theme:"Love & Relationships",desc:"A clear look at where things stand.",positions:["Where I Am","Where They Are","Where We Are Headed"]},
  {id:"mn1",name:"Money & Me",theme:"Money & Career",desc:"Your relationship with money right now.",positions:["What I Believe About Money","What I'm Blocking","What's Available To Me"]}
];

const STORY_PROMPTS=[
  "What do you want vs what do you actually need?",
  "What's standing in your way?",
  "What happens if you do nothing?",
  "What don't you know yet?",
  "What are you pretending not to feel?",
  "What have you been waiting for permission to do?",
  "What would you do if you weren't afraid?",
  "What do you need to stop trying to control?",
  "What is trying to find you that you keep blocking?",
  "What are you getting out of staying stuck?",
  "What hurt you that you never talked about?",
  "Who are you becoming because of this?",
  "What do you want so badly you're afraid to say it?",
  "What would make everything feel worth it?",
  "What are you capable of that scares you?"
];

let selLevel=null,selSpread=null,tmpl='',blanks=0,showHints=true;

function prog(step,total){
  const b=document.getElementById('prog');b.innerHTML='';
  for(let i=0;i<total;i++){const d=document.createElement('div');d.className='prog-step'+(i<step?' active':'');b.appendChild(d);}
}
function S(html){document.getElementById('screen').innerHTML=html;}
function $(id){return document.getElementById(id);}

function startOver(){selLevel=null;selSpread=null;tmpl='';blanks=0;showHints=true;levelScreen();}

function startOverBtn(){return `<button class="btn-start-over" onclick="startOver()">Start over</button>`;}

function grammarNote(){
  return `<div class="note-box"><strong>Quick reminder:</strong> Noun = a person, place, or thing. &nbsp;Adjective = a describing word. &nbsp;Verb = an action word.</div>`;
}

function questionNote(){
  return `<div class="note-box"><strong>How to get a good reading:</strong> The more specific your question or intention, the more your cards have to work with. Instead of "what's happening in my life," try "what do I need to know about this decision?" or "what's blocking me right now?"</div>`;
}

function levelScreen(){
  prog(1,4);
  const themes=[...new Set(SPREADS.map(s=>s.theme))];
  S(`
    <div class="step-label">Step 1 of 4</div>
    <h2>Choose your level</h2>
    <p class="sub">Be honest with yourself. You can always level up.</p>
    <div class="level-grid">
      ${[1,2,3,4].map(n=>`<div class="level-card" onclick="pickLevel(${n})">
        <div class="level-num">${n}</div>
        <div>
          <div class="level-name">Level ${n}</div>
          <div class="level-desc">${n===1?'1 sentence per card. 2 keywords. Brand new to the method.':n===2?'2 sentences per card. 2 keywords each. Finding your rhythm.':n===3?'3 sentences per card. 2 keywords each. Building confidence.':'4 sentences per card. 2 keywords each. Getting deep.'}</div>
        </div>
      </div>`).join('')}
      <div class="level-card" onclick="pickLevel(5)">
        <div class="level-num">5</div>
        <div>
          <div class="level-name">Level 5 — Freeform</div>
          <div class="level-desc">Create your own story using the spread as your only prompt.</div>
        </div>
      </div>
    </div>
    <div style="margin-top:1.5rem;text-align:center;">
      <button class="btn-ghost" onclick="importScreen()" style="font-size:13px;">Import a spread I found</button>
    </div>
  `);
}

function pickLevel(n){
  selLevel={n,name:`Level ${n}`};
  themeScreen();
}

function themeScreen(){
  prog(2,4);
  const themes=[...new Set(SPREADS.map(s=>s.theme))];
  S(`
    <div class="step-label">Step 2 of 4</div>
    <h2>Choose a theme</h2>
    <p class="sub">Pick what you want to explore today.</p>
    <div class="theme-grid">
      ${themes.map(t=>{
        const count=SPREADS.filter(s=>s.theme===t).length;
        return `<div class="theme-card" onclick="spreadScreen('${t}')">
          <div class="theme-name">${t}</div>
          <div class="theme-count">${count} spread${count!==1?'s':''}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="levelScreen()">Back</button></div>
  `);
}

function spreadScreen(theme){
  prog(3,4);
  const filtered=SPREADS.filter(s=>s.theme===theme);
  S(`
    <div class="step-label">Step 3 of 4</div>
    <h2>${theme}</h2>
    <p class="sub">Choose a spread.</p>
    ${questionNote()}
    <div class="spread-list">
      ${filtered.map(sp=>`<div class="spread-card" onclick="pickSpread('${sp.id}')">
        <div class="spread-name">${sp.name}</div>
        <div class="spread-desc">${sp.desc}</div>
        <span class="spread-count">${sp.positions.length} cards</span>
      </div>`).join('')}
    </div>
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="themeScreen()">Back</button></div>
  `);
}

function pickSpread(id){
  selSpread=SPREADS.find(s=>s.id===id);
  selLevel.n===5?level5Screen():templateScreen();
}

function level5Screen(){
  prog(3,4);
  S(`
    <div class="step-label">Step 3 of 4</div>
    <h2>${selSpread.name}</h2>
    <p class="sub">Use each position as your prompt. Write your own fill-in-the-blank sentence for each one. Use _______ where you want a blank.</p>
    <button class="btn-small" onclick="togglePrompts()" style="margin-bottom:1.25rem;">Story Prompt Library</button>
    <div id="prompts-box" style="display:none;margin-bottom:1.25rem;">
      <div class="prompt-grid">${STORY_PROMPTS.map(p=>`<div class="prompt-pill" onclick="copyPrompt('${p.replace(/'/g,"\\'")}')">${p}</div>`).join('')}</div>
      <p style="font-size:12px;color:#aaaaaa;font-family:Arial,sans-serif;margin-top:8px;">Click any prompt to copy it.</p>
    </div>
    ${selSpread.positions.map((pos,i)=>`
      <div>
        <div class="l5-prompt">${pos}</div>
        <div class="l5-hint">Write your sentence with _______ where you want a blank</div>
        <textarea class="freeform-ta" id="fs${i}" rows="2" placeholder="e.g. ${pos} is _______ and it makes me feel _______."></textarea>
      </div>
      ${i<selSpread.positions.length-1?'<hr class="slot-divider">':''}
    `).join('')}
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="spreadScreen('${selSpread.theme}')">Back</button><button class="btn-primary" onclick="level5FillScreen()">Pull my cards</button></div>
  `);
}

function togglePrompts(){
  const box=$('prompts-box');
  if(box)box.style.display=box.style.display==='none'?'block':'none';
}

function copyPrompt(text){
  navigator.clipboard.writeText(text).then(()=>alert('Copied! Paste it into your sentence.'));
}

function level5FillScreen(){
  blanks=0;
  const sentences=selSpread.positions.map((pos,i)=>({pos,sentence:$('fs'+i).value.trim()||`${pos} is _______ and it makes me feel _______.`}));
  tmpl=sentences.map(({pos,sentence})=>`**${pos}**\n${sentence}`).join('\n\n');
  let html='<div class="story-wrap">';
  sentences.forEach(({pos,sentence})=>{
    const rendered=sentence.replace(/_______/g,()=>`<input class="blank-input" type="text" id="b${blanks++}" placeholder="___" />`);
    html+=`<div class="story-section"><div class="story-section-label">${pos}</div><p style="line-height:2.6;">${rendered}</p></div>`;
  });
  html+='</div>';
  S(`
    <div class="step-label">Step 3 of 4</div>
    <h2>Fill in the blanks</h2>
    <p class="sub">Pull your cards. Use your keywords or your intuition to fill in each blank.</p>
    ${grammarNote()}
    ${html}
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="level5Screen()">Back</button><button class="btn-primary" onclick="level5StoryScreen()">See my reading</button></div>
  `);
}

function level5StoryScreen(){
  prog(4,4);
  let filled=tmpl;
  for(let i=0;i<blanks;i++){const el=$('b'+i);filled=filled.replace('_______',el?el.value.trim()||'_____':'_____');}
  const secs=filled.split(/\*\*([^*]+)\*\*/);
  let html='<div class="story-wrap">';
  for(let i=1;i<secs.length;i+=2){
    const h=secs[i].trim(),b=(secs[i+1]||'').trim();
    html+=`<div class="story-section"><div class="story-section-label">${h}</div><p style="line-height:1.9;">${b.replace(/\n/g,'<br>')}</p></div>`;
  }
  html+='</div>';
  window._currentReading=filled.replace(/\*\*/g,'');
  S(`
    <div class="step-label">Step 4 of 4</div>
    <h2>Your reading</h2>
    <p class="sub">Read this out loud. All of it.</p>
    ${html}
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="level5FillScreen()">Back</button><button class="btn-ghost" onclick="copyReading()">Copy reading</button><button class="btn-ghost" onclick="downloadReading()">Download</button><button class="btn-primary" onclick="levelScreen()">New reading</button></div>
  `);
}

function templateScreen(){
  prog(3,4);
  S(`
    <div class="step-label">Step 3 of 4</div>
    <h2>Your story template</h2>
    <p class="sub">Pull your cards while we build your template.</p>
    <div class="loading" id="ta">Building your template...</div>
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="spreadScreen('${selSpread.theme}')">Back</button></div>
  `);
  buildTemplate();
}

async function buildTemplate(){
  const posNames=selSpread.positions.map((p,i)=>`Card ${i+1} — ${p}`).join('\n');
  const lv=selLevel.n;
  const prompt=`You are building a Tarot Stories Method fill-in-the-blank story template using the Mad Lib method.\n\nSpread: "${selSpread.name}"\nPositions:\n${posNames}\n\nLevel ${lv}: Write exactly ${lv} sentence(s) per card position.\n\nRules:\n- Turn the position name into a sentence using its exact words with minimal connecting words\n- Each sentence has exactly 2 blanks using _______ (seven underscores)\n- First blank: main card keyword labeled (noun - Card X), (verb - Card X), or (adjective - Card X)\n- Second blank: a qualifier like "and it makes me feel _______ (adjective - Card X)"\n- Vary word types across positions\n- No mystical language. Real human sentences.\n- For Level 2+, each additional sentence goes one layer deeper into that position\n\nFormat: bold position header, then sentences. Nothing else. No intro. No explanation.\n\nExample:\n**Past (Card 1)**\nRight now I am carrying _______ (noun - Card 1) and it is making me feel _______ (adjective - Card 1).\n\n**Present (Card 2)**\nWhat is happening right now is _______ (verb - Card 2) and the energy feels _______ (adjective - Card 2).`;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const e=await r.text();const ta=$('ta');if(ta)ta.innerHTML=`<p class="err">API error ${r.status}: ${e}</p>`;return;}
    const data=await r.json();
    if(!data.content){const ta=$('ta');if(ta)ta.innerHTML=`<p class="err">No content: ${JSON.stringify(data)}</p>`;return;}
    tmpl=data.content.map(b=>b.text||'').join('').trim();
    fillScreen();
  }catch(e){const ta=$('ta');if(ta)ta.innerHTML=`<p class="err">Error: ${e.message}</p>`;}
}

function fillScreen(){
  blanks=0;
  const secs=tmpl.split(/\*\*([^*]+)\*\*/);
  let html='<div class="story-wrap">';
  for(let i=1;i<secs.length;i+=2){
    const heading=secs[i].trim();
    const body=(secs[i+1]||'').trim();
    let rendered=showHints?body:body.replace(/ \([^)]+- Card \d+\)/g,'');
    rendered=rendered.replace(/_______/g,()=>`<input class="blank-input" type="text" id="b${blanks++}" placeholder="___" />`);
    html+=`<div class="story-section"><div class="story-section-label">${heading}</div><p style="line-height:2.6;">${rendered.replace(/\n/g,'<br>')}</p></div>`;
  }
  if(blanks===0)html+=`<div class="story-section"><p style="font-size:14px;font-family:Arial,sans-serif;line-height:1.8;">${tmpl.replace(/\n/g,'<br>')}</p></div>`;
  html+='</div>';

  const grammarN=selLevel.n<=2?grammarNote():'';
  S(`
    <div class="step-label">Step 3 of 4</div>
    <h2>Fill in the blanks</h2>
    <p class="sub">Pull ${selSpread.positions.length} cards from your deck. Use your Tarot Stories Method Keyword Cheatsheet to help you fill in the blanks or trust your intuitive hits.</p>
    <p class="sub" style="margin-top:-0.5rem;">You'll need to use your creativity and intuition to fill in the story. You may need to add additional words besides the keywords in order for the story to make sense.</p>
    ${grammarN}
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="hints-toggle" ${showHints?'checked':''} onchange="toggleHints()"><span class="toggle-slider"></span></label>
      <span>Show word type hints (noun, verb, adjective)</span>
    </div>
    ${html}
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="spreadScreen('${selSpread.theme}')">Back</button><button class="btn-primary" onclick="storyScreen()">See my reading</button></div>
  `);
}

function toggleHints(){
  showHints=$('hints-toggle').checked;
  fillScreen();
}

async function storyScreen(){
  prog(4,4);
  let filled=tmpl;
  for(let i=0;i<blanks;i++){const el=$('b'+i);filled=filled.replace('_______',el?el.value.trim()||'_____':'_____');}
  if(!showHints)filled=filled.replace(/ \([^)]+- Card \d+\)/g,'');
  const secs=filled.split(/\*\*([^*]+)\*\*/);
  let html='<div class="story-wrap">';
  for(let i=1;i<secs.length;i+=2){
    const h=secs[i].trim(),b=(secs[i+1]||'').trim();
    html+=`<div class="story-section"><div class="story-section-label">${h}</div><p style="line-height:1.9;">${b.replace(/\n/g,'<br>')}</p></div>`;
  }
  if(secs.length<=1)html+=`<div class="story-section"><p style="line-height:1.9;font-family:Arial,sans-serif;">${filled.replace(/\n/g,'<br>')}</p></div>`;
  html+='</div>';
  window._currentReading=filled.replace(/\*\*/g,'').replace(/ \([^)]+- Card \d+\)/g,'');

  S(`
    <div class="step-label">Step 4 of 4</div>
    <h2>Your reading</h2>
    <p class="sub">Read this out loud. All of it.</p>
    ${html}
    <div class="loading" id="fb">Getting your feedback...</div>
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="fillScreen()">Back</button><button class="btn-ghost" onclick="copyReading()">Copy reading</button><button class="btn-primary" onclick="levelScreen()">New reading</button></div>
  `);

  await getFeedback(filled);
}

async function getFeedback(filledStory){
  const lv=selLevel.n;
  const prompt=`You are a Tarot Stories Method coach. A student just completed a fill-in-the-blank tarot reading.\n\nSpread: "${selSpread.name}"\nLevel: ${lv}\n\nTheir completed reading:\n${filledStory}\n\nRespond with these exact bold headers:\n\n**What's working:**\nOne specific sentence on the strongest storytelling element in their reading.\n\n**One question to sit with:**\nOne honest direct question this reading is pointing to. No fluff.${lv<=2?'\n\n**How did that feel?**\nAsk them: How did that feel to read back to yourself? What surprised you? What would you change? Remind them the reading is not set in stone — they can always go back and adjust it.':''}`;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const fb=$('fb');if(fb)fb.innerHTML='';return;}
    const data=await r.json();
    if(!data.content){const fb=$('fb');if(fb)fb.innerHTML='';return;}
    const text=data.content.map(b=>b.text||'').join('');
    const secDefs=lv<=2?[{k:"What's working:",l:"What's working"},{k:"One question to sit with:",l:"One question to sit with"},{k:"How did that feel?",l:"How did that feel?"}]:[{k:"What's working:",l:"What's working"},{k:"One question to sit with:",l:"One question to sit with"}];
    let html='<div class="feedback-wrap">';
    secDefs.forEach((sec,i)=>{
      const start=text.indexOf('**'+sec.k+'**');let end=text.length;
      secDefs.slice(i+1).forEach(ns=>{const idx=text.indexOf('**'+ns.k+'**');if(idx>start&&idx<end)end=idx;});
      if(start!==-1){const content=text.slice(start+sec.k.length+4,end).trim();html+=`<div style="margin-bottom:1rem;"><div class="story-section-label">${sec.l}</div><p style="font-size:14px;line-height:1.7;font-family:Arial,sans-serif;color:#111111;">${content.replace(/\n/g,'<br>')}</p></div>`;}
    });
    html+='</div>';
    const fb=$('fb');if(fb)fb.outerHTML=html;
  }catch(e){const fb=$('fb');if(fb)fb.innerHTML='';}
}

function copyReading(){
  const text=window._currentReading||'';
  navigator.clipboard.writeText(text).then(()=>{
    const btns=document.querySelectorAll('[onclick="copyReading()"]');
    btns.forEach(btn=>{btn.textContent='Copied!';setTimeout(()=>{btn.textContent='Copy reading';},2000);});
  });
}

function downloadReading(){
  const text=window._currentReading||'';
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='my-tarot-reading.txt';
  a.click();
}

function importScreen(){
  prog(1,4);
  let posRows='';
  for(let i=0;i<8;i++){
    posRows+=`<div class="pos-row"><span class="pos-num">${i+1}</span><input class="card-input" type="text" id="imp${i}" placeholder="Position name" style="margin-bottom:0;" /></div>`;
  }
  const sentOptions=[1,2,3,4].map(n=>`<option value="${n}">${n} sentence${n>1?'s':''} per position</option>`).join('');
  S(`
    <div class="step-label">Import a Spread</div>
    <h2>Import a spread</h2>
    <p class="sub">Found a spread you love? Paste the position names below and we'll turn it into a Tarot Stories Method template.</p>
    <div style="border:0.5px solid #e0d9d0;border-radius:12px;padding:1.25rem;margin-bottom:1rem;">${posRows}</div>
    <div style="margin-bottom:1.5rem;">
      <select id="imp-sents" style="font-size:14px;padding:9px 12px;border:0.5px solid #e0d9d0;border-radius:8px;background:#fff;color:#111111;font-family:Arial,sans-serif;width:100%;">${sentOptions}</select>
    </div>
    <div class="btn-row">${startOverBtn()}<button class="btn-ghost" onclick="levelScreen()">Back</button><button class="btn-primary" onclick="importBuild()">Build my template</button></div>
  `);
}

async function importBuild(){
  const positions=[];
  for(let i=0;i<8;i++){const v=$('imp'+i).value.trim();if(v)positions.push(v);}
  if(positions.length===0){alert('Add at least one position name.');return;}
  const sentsPerPos=parseInt($('imp-sents').value)||1;
  selSpread={id:'imported',name:'My Imported Spread',theme:'General',positions};
  selLevel={n:sentsPerPos,name:`${sentsPerPos} sentence${sentsPerPos>1?'s':''} per position`};
  templateScreen();
}

levelScreen();
</script>
</body>
</html>
