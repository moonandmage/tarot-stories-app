<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot Stories Method — Moon & Mage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#ffffff;color:#111111;font-family:Georgia,'Times New Roman',serif;min-height:100vh;}
#app{max-width:700px;margin:0 auto;padding:1.5rem 1rem;}
.app-header{text-align:center;padding:1.5rem 0 1rem;border-bottom:1px solid #b89967;margin-bottom:2rem;}
.app-title{font-size:24px;font-weight:500;letter-spacing:0.04em;color:#111111;}
.app-sub{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#b89967;margin-top:6px;font-family:Arial,sans-serif;}
.progress-bar{display:flex;align-items:center;gap:8px;margin-bottom:2rem;justify-content:center;}
.prog-step{width:22px;height:2px;background:#e0d9d0;}
.prog-step.active{background:#b89967;}
.level-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:1.5rem;}
.level-card{border:0.5px solid #e0d9d0;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;background:#ffffff;transition:border-color 0.15s;display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:center;}
.level-card:hover{border-color:#b89967;}
.level-num{font-size:20px;font-weight:500;color:#b89967;text-align:center;}
.level-name{font-size:15px;font-weight:500;color:#111111;margin-bottom:3px;}
.level-desc{font-size:13px;color:#888888;font-family:Arial,sans-serif;line-height:1.5;}
.spread-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem;}
.spread-card{border:0.5px solid #e0d9d0;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;background:#ffffff;transition:border-color 0.15s;}
.spread-card:hover{border-color:#b89967;}
.spread-level{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#b89967;margin-bottom:4px;font-family:Arial,sans-serif;}
.spread-name{font-size:15px;font-weight:500;margin-bottom:4px;color:#111111;}
.spread-desc{font-size:13px;color:#888888;line-height:1.5;font-family:Arial,sans-serif;}
.spread-count{display:inline-block;margin-top:8px;font-size:12px;color:#aaaaaa;font-family:Arial,sans-serif;}
.slot-divider{border:none;border-top:0.5px solid #e0d9d0;margin:16px 0;}
.slot-pos{font-size:14px;font-weight:500;color:#111111;margin-bottom:4px;}
.card-input{width:100%;font-size:14px;padding:9px 12px;border:0.5px solid #e0d9d0;border-radius:8px;background:#ffffff;color:#111111;font-family:Arial,sans-serif;margin-bottom:8px;display:block;}
.card-input:focus{outline:none;border-color:#b89967;}
.freeform-ta{width:100%;font-size:14px;padding:9px 12px;border:0.5px solid #e0d9d0;border-radius:8px;background:#ffffff;color:#111111;font-family:Arial,sans-serif;resize:none;line-height:1.6;display:block;}
.freeform-ta:focus{outline:none;border-color:#b89967;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;}
.btn-primary{font-size:13px;padding:10px 22px;background:#b89967;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:Arial,sans-serif;letter-spacing:0.06em;}
.btn-primary:hover{background:#a0834f;}
.btn-ghost{font-size:13px;padding:10px 18px;background:transparent;color:#888888;border:0.5px solid #e0d9d0;border-radius:8px;cursor:pointer;font-family:Arial,sans-serif;}
.btn-ghost:hover{border-color:#b89967;color:#111111;}
.loading{text-align:center;padding:2rem 0;color:#888888;font-family:Arial,sans-serif;font-size:14px;}
.story-wrap{border:0.5px solid #e0d9d0;border-radius:12px;overflow:hidden;margin-bottom:1.5rem;}
.story-section{padding:1.25rem 1.5rem;border-bottom:0.5px solid #e0d9d0;}
.story-section:last-child{border-bottom:none;}
.story-section-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#b89967;margin-bottom:8px;font-family:Arial,sans-serif;}
.story-section p{font-size:15px;line-height:1.9;color:#111111;font-family:Arial,sans-serif;}
.blank-input{width:130px;font-size:13px;padding:3px 6px;border:none;border-bottom:1.5px solid #b89967;background:transparent;color:#111111;font-family:Arial,sans-serif;outline:none;}
.step-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#b89967;margin-bottom:8px;font-family:Arial,sans-serif;}
h2{font-size:20px;font-weight:500;margin-bottom:6px;color:#111111;}
.sub{font-size:14px;color:#888888;margin-bottom:1.5rem;font-family:Arial,sans-serif;line-height:1.6;}
.err{color:#c0392b;font-family:Arial,sans-serif;font-size:13px;padding:1rem 0;}
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="app-title">Tarot Stories Method</div>
    <div class="app-sub">Moon &amp; Mage &middot; The Tarot Circle</div>
  </div>
  <div class="progress-bar" id="prog"></div>
  <div id="screen"></div>
</div>
<script>
const LEVELS=[
  {n:1,name:"Level 1",desc:"1 sentence per card. 2 keywords. Brand new to the method."},
  {n:2,name:"Level 2",desc:"2 sentences per card. 2 keywords each. Finding your rhythm."},
  {n:3,name:"Level 3",desc:"3 sentences per card. 2 keywords each. Building confidence."},
  {n:4,name:"Level 4",desc:"4 sentences per card. 2 keywords each. Getting deep."},
  {n:5,name:"Level 5",desc:"Freeform. You write your own sentences. No hand-holding."}
];
const SPREADS=[
  {id:"ppf",name:"Past, Present, Future",level:"Beginner",desc:"Three cards. One clear storyline.",positions:["Past","Present","Future"]},
  {id:"sao",name:"Situation, Action, Outcome",level:"Beginner",desc:"What's happening, what to do, where it leads.",positions:["Situation","Action","Outcome"]},
  {id:"mbs",name:"Mind, Body, Spirit",level:"Intermediate",desc:"A fuller picture of where you are right now.",positions:["Mind","Body","Spirit","Integration","Message"]},
  {id:"bgp",name:"Block, Gift, Path",level:"Intermediate",desc:"What's in the way, what you have, how to move.",positions:["The Block","Hidden Gift","The Path","Next Step"]},
  {id:"sc",name:"The Story Cross",level:"Advanced",desc:"Six cards. Full narrative from root to resolution.",positions:["Root Cause","Crossing Energy","Foundation","Recent Past","Possible Future","Resolution"]},
  {id:"sl",name:"Shadow & Light",level:"Advanced",desc:"What you're avoiding and what's trying to emerge.",positions:["The Shadow","The Wound","The Gift Inside It","What Light Looks Like","The Integration","Your Next Move"]}
];
let selLevel=null,selSpread=null,tmpl='',blanks=0;

function prog(step,total){
  const b=document.getElementById('prog');b.innerHTML='';
  for(let i=0;i<total;i++){const d=document.createElement('div');d.className='prog-step'+(i<step?' active':'');b.appendChild(d);}
}
function S(html){document.getElementById('screen').innerHTML=html;}
function $(id){return document.getElementById(id);}

function levelScreen(){
  prog(1,4);
  S(`<div class="step-label">Step 1 of 4</div><h2>Choose your level</h2><p class="sub">Be honest with yourself. You can always level up.</p><div class="level-grid">${LEVELS.map(lv=>`<div class="level-card" id="lc${lv.n}" onclick="pickLevel(${lv.n})"><div class="level-num">${lv.n}</div><div><div class="level-name">${lv.name}</div><div class="level-desc">${lv.desc}</div></div></div>`).join('')}</div>`);
}

function pickLevel(n){
  selLevel=LEVELS.find(l=>l.n===n);
  spreadScreen();
}

function spreadScreen(){
  prog(2,4);
  S(`<div class="step-label">Step 2 of 4</div><h2>Choose your spread</h2><p class="sub">Start where you are. You can always go deeper.</p><div class="spread-grid">${SPREADS.map(sp=>`<div class="spread-card" onclick="pickSpread('${sp.id}')"><div class="spread-level">${sp.level}</div><div class="spread-name">${sp.name}</div><div class="spread-desc">${sp.desc}</div><span class="spread-count">${sp.positions.length} cards</span></div>`).join('')}</div><div class="btn-row"><button class="btn-ghost" onclick="levelScreen()">Back</button></div>`);
}

function pickSpread(id){
  selSpread=SPREADS.find(s=>s.id===id);
  selLevel.n===5?freeformScreen():templateScreen();
}

function templateScreen(){
  prog(3,4);
  S(`<div class="step-label">Step 3 of 4</div><h2>Your story template</h2><p class="sub">Pull your cards while we build your template.</p><div class="loading" id="ta">Building your template...</div><div class="btn-row"><button class="btn-ghost" onclick="spreadScreen()">Back</button></div>`);
  buildTemplate();
}

async function buildTemplate(){
  const posNames=selSpread.positions.map((p,i)=>`Card ${i+1} — ${p}`).join('\n');
  const lv=selLevel.n;
  const prompt=`You are building a Tarot Stories Method fill-in-the-blank story template using the Mad Lib method.\n\nSpread: "${selSpread.name}"\nPositions:\n${posNames}\n\nLevel ${lv}: Write exactly ${lv} sentence(s) per card position.\n\nRules:\n- Turn the position name into a sentence using its exact words with minimal connecting words\n- Each sentence has exactly 2 blanks using _______ (seven underscores)\n- First blank: main card keyword labeled (noun - Card X), (verb - Card X), or (adjective - Card X)\n- Second blank: a qualifier like "and it makes me feel _______ (adjective - Card X)"\n- Vary word types across positions\n- No mystical language. Real human sentences.\n- For Level 2+, each additional sentence goes one layer deeper into that position\n\nFormat: bold position header, then sentences. Nothing else. No intro. No explanation.\n\nExample:\n**Past (Card 1)**\nRight now I am carrying _______ (noun - Card 1) and it is making me feel _______ (adjective - Card 1).\n\n**Present (Card 2)**\nWhat is happening right now is _______ (verb - Card 2) and the energy feels _______ (adjective - Card 2).`;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const e=await r.text();const ta=$('ta');if(ta)ta.innerHTML=`<p class="err">API error ${r.status}: ${e}</p>`;return;}
    const data=await r.json();
    if(!data.content){const ta=$('ta');if(ta)ta.innerHTML=`<p class="err">No content: ${JSON.stringify(data)}</p>`;return;}
    tmpl=data.content.map(b=>b.text||'').join('').trim();
    fillScreen();
  }catch(e){const ta=$('ta');if(ta)ta.innerHTML=`<p class="err">Error: ${e.message}</p>`;}
}

function fillScreen(){
  prog(3,4);blanks=0;
  const secs=tmpl.split(/\*\*([^*]+)\*\*/);
  let html='<div class="story-wrap">';
  for(let i=1;i<secs.length;i+=2){
    const heading=secs[i].trim();
    const body=(secs[i+1]||'').trim();
    const rendered=body.replace(/_______/g,()=>`<input class="blank-input" type="text" id="b${blanks++}" placeholder="___" />`);
    html+=`<div class="story-section"><div class="story-section-label">${heading}</div><p style="line-height:2.6;">${rendered.replace(/\n/g,'<br>')}</p></div>`;
  }
  if(blanks===0)html+=`<div class="story-section"><p style="font-family:Arial,sans-serif;font-size:14px;line-height:1.8;">${tmpl.replace(/\n/g,'<br>')}</p></div>`;
  html+='</div>';
  S(`<div class="step-label">Step 3 of 4</div><h2>Fill in the blanks</h2><p class="sub">Pull your cards. Use your card keywords to fill in each blank.</p>${html}<div class="btn-row"><button class="btn-ghost" onclick="spreadScreen()">Back</button><button class="btn-primary" onclick="storyScreen()">See my reading</button></div>`);
}

function storyScreen(){
  prog(4,4);
  let filled=tmpl;
  for(let i=0;i<blanks;i++){const el=$('b'+i);filled=filled.replace('_______',el?el.value.trim()||'_____':'_____');}
  const secs=filled.split(/\*\*([^*]+)\*\*/);
  let html='<div class="story-wrap">';
  for(let i=1;i<secs.length;i+=2){
    const heading=secs[i].trim();
    const body=(secs[i+1]||'').trim();
    html+=`<div class="story-section"><div class="story-section-label">${heading}</div><p style="line-height:1.9;">${body.replace(/\n/g,'<br>')}</p></div>`;
  }
  if(secs.length<=1)html+=`<div class="story-section"><p style="line-height:1.9;font-family:Arial,sans-serif;">${filled.replace(/\n/g,'<br>')}</p></div>`;
  html+='</div>';
  S(`<div class="step-label">Step 4 of 4</div><h2>Your reading</h2><p class="sub">Read this out loud. All of it.</p>${html}<div class="btn-row"><button class="btn-ghost" onclick="fillScreen()">Back</button><button class="btn-primary" onclick="levelScreen()">New reading</button></div>`);
}

function freeformScreen(){
  prog(3,4);
  const slots=selSpread.positions.map((pos,i)=>`<div class="card-slot"><div class="slot-pos">${pos} — Card ${i+1}</div><input class="card-input" type="text" id="cn${i}" placeholder="Card name (e.g. The Moon)" /><textarea class="freeform-ta" id="cf${i}" rows="3" placeholder="Write your sentences about this card..."></textarea></div>${i<selSpread.positions.length-1?'<hr class="slot-divider">':''}`).join('');
  S(`<div class="step-label">Step 3 of 4</div><h2>Pull your cards</h2><p class="sub">Write your own sentences for each position. Use the spread as your guide.</p>${slots}<div class="btn-row"><button class="btn-ghost" onclick="spreadScreen()">Back</button><button class="btn-primary" onclick="submitFreeform()">Build my story</button></div>`);
}

async function submitFreeform(){
  const cardData=selSpread.positions.map((pos,i)=>({position:pos,card:$('cn'+i).value.trim(),writing:$('cf'+i).value.trim()}));
  prog(4,4);
  S(`<div class="step-label">Step 4 of 4</div><h2>Your reading</h2><p class="sub">Read this out loud. All of it.</p><div class="loading" id="sa">Building your reading...</div><div class="btn-row"><button class="btn-ghost" onclick="freeformScreen()">Back</button><button class="btn-primary" onclick="levelScreen()">New reading</button></div>`);
  const cardList=cardData.map(cd=>`- ${cd.position}: ${cd.card||'(no card)'}\n  Their writing: ${cd.writing||'(none)'}`).join('\n');
  const prompt=`You are a tarot reading coach using the Tarot Stories Method. The reader is at Level 5 — freeform.\n\nSpread: "${selSpread.name}"\nCards and what they wrote:\n${cardList}\n\nRespond with these exact bold headers:\n\n**What you built:**\nWeave their sentences into one connected reading. Honor their words. Connect — don't rewrite.\n\n**What's working:**\nOne sentence on their strongest storytelling move.\n\n**Go deeper:**\nPick 2 questions from this list that would push their story further:\n- What do you want vs what do you actually need?\n- What's standing in your way?\n- What happens if you do nothing?\n- What don't you know yet?\n- What are you pretending not to feel?\n- What have you been waiting for permission to do?\n- What would you do if you weren't afraid?\n- What do you need to stop trying to control?`;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const e=await r.text();const sa=$('sa');if(sa)sa.innerHTML=`<p class="err">API error ${r.status}: ${e}</p>`;return;}
    const data=await r.json();
    if(!data.content){const sa=$('sa');if(sa)sa.innerHTML=`<p class="err">No content: ${JSON.stringify(data)}</p>`;return;}
    const text=data.content.map(b=>b.text||'').join('');
    const secDefs=[{k:'What you built:',l:'What you built'},{k:"What's working:",l:"What's working"},{k:'Go deeper:',l:'Go deeper'}];
    let html='<div class="story-wrap">';
    secDefs.forEach((sec,i)=>{
      const start=text.indexOf('**'+sec.k+'**');let end=text.length;
      secDefs.slice(i+1).forEach(ns=>{const idx=text.indexOf('**'+ns.k+'**');if(idx>start&&idx<end)end=idx;});
      if(start!==-1){const content=text.slice(start+sec.k.length+4,end).trim();html+=`<div class="story-section"><div class="story-section-label">${sec.l}</div><p>${content.replace(/\n/g,'<br>')}</p></div>`;}
    });
    html+='</div>';
    const sa=$('sa');if(sa)sa.outerHTML=html;
  }catch(e){const sa=$('sa');if(sa)sa.innerHTML=`<p class="err">Error: ${e.message}</p>`;}
}

levelScreen();
</script>
</body>
</html>
